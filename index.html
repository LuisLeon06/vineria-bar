<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vineria bar | Menú Digital</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Ocultar TODOS los elementos visuales inyectados por Google Translate -->
    <style>
        .goog-te-banner-frame {
            display: none !important;
        }

        .goog-te-menu-frame {
            display: none !important;
        }

        .goog-te-balloon-frame {
            display: none !important;
        }

        #goog-gt-tt {
            display: none !important;
        }

        .VIpgJd-ZVi9od-l4eHX-hSRGPd {
            display: none !important;
        }

        .VIpgJd-ZVi9od-aZ2wEe-wOHMyf {
            display: none !important;
        }

        [id^="goog-gt-"] {
            display: none !important;
        }

        #google_translate_element {
            display: none !important;
        }

        .goog-te-gadget {
            display: none !important;
        }

        .goog-logo-link {
            display: none !important;
        }

        /* Forzar cuerpo en posición 0 (Google lo desplaza 40px) */
        body {
            top: 0px !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div id="google_translate_element"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'es',
                autoDisplay: false,
                multilanguagePage: true
            }, 'google_translate_element');
        }
        // Ocultar la barra de Google Translate si aparece después de la carga
        document.addEventListener('DOMContentLoaded', function () {
            var observer = new MutationObserver(function () {
                var frame = document.querySelector('.goog-te-banner-frame');
                if (frame) { frame.style.display = 'none'; }
                if (document.body.style.top && document.body.style.top !== '0px') {
                    document.body.style.top = '0px';
                }
            });
            observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
        });
    </script>
    <script type="text/javascript"
        src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
